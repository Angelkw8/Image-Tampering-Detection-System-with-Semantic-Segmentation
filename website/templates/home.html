{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}
<div class="d-flex align-items-above justify-content-center" style="min-height: 90vh;">
    <div class="col-md-8">
        <div class="card shadow-sm text-center">
            <div class="card-body">

                <h3 class="page-title">Image Tampering Detection</h3>

                <p class="text-muted mt-3">
                    A deep learning–based semantic segmentation system for detecting
                    manipulated regions in digital images.
                </p>

                {% if user.is_authenticated %}
                <a href="/image" class="btn btn-dark mt-4">
                    <i class="fa fa-image"></i> Start Detection
                </a>
                {% endif %}

            </div>
        </div>
    </div>
</div>
{% endblock %}
